<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Ошибка {{ status }} — STD RF</title>
  <style>
    :root {
      --primary: #1F1E5E;
      --secondary: #798BFF;
      --surface: #FFFFFF;
      --text: #2A3F60;
      --muted: #999999;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f6;
      padding: 24px 16px;
    }
    .error-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(31,30,94,0.12);
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-message {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .home-link {
      display: inline-block;
      padding: 12px 28px;
      background: var(--secondary);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .home-link:hover { background: var(--primary); }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">{{ status }}</div>
    <p class="error-message">{{ message }}</p>
    <a href="/" class="home-link">На главную</a>
  </div>
</body>
</html>
